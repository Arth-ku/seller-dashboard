[Unit]
Wants=network-online.target
After=network-online.target
RequiresMountsFor=/home/lwarm/apps/seller-dashboard/data /home/lwarm/apps/seller-dashboard/uploads /var/www/authenticitycheck
StartLimitIntervalSec=0

[Service]
Restart=always
RestartSec=5
ExecStartPre=/usr/bin/mkdir -p /home/lwarm/apps/seller-dashboard/data /home/lwarm/apps/seller-dashboard/uploads
